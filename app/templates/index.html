<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chunav Guide AI | Indian Election Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo">
                <i data-lucide="vote"></i>
                <span>Chunav<strong>Guide</strong></span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('chat')">
                    <i data-lucide="message-square"></i> AI Assistant
                </button>
                <button class="nav-item" onclick="switchTab('timeline')">
                    <i data-lucide="calendar"></i> Timeline
                </button>
                <button class="nav-item" onclick="switchTab('guide')">
                    <i data-lucide="book-open"></i> Step Guide
                </button>
            </nav>

            <div class="status-card">
                <p>System Status</p>
                <div class="status-indicator">
                    <span class="dot"></span> 100% Uptime Active
                </div>
            </div>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h1>Election Assistant</h1>
                <div class="user-profile">Urvashi</div>
            </header>

            <section id="chat-tab" class="tab-content active">
                <div class="chat-messages" id="chat-box">
                    <div class="message ai">
                        Namaste! I am your <strong>Chunav Guide</strong>. How can I help you participate in the world's largest democracy today?
                    </div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="Ask about Voter ID, Booths, or Dates...">
                    <button id="send-btn"><i data-lucide="send"></i></button>
                </div>
            </section>

            <section id="timeline-tab" class="tab-content">
                <div class="timeline-container" id="timeline-list">
                    </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
